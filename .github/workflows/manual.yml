name: Manual Run

# One-shot manual invocation. Useful for: testing changes to the agent,
# kicking off a fresh run after fixing a failure, or running with a
# tailored prompt for a specific task (e.g. "research Anthropic only").

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Agent prompt (defaults to daily workflow)"
        required: false
        default: "Run your daily workflow. The vault root is the current working directory; treat all paths as relative to cwd."
      max_turns:
        description: "Max agent turns"
        required: false
        default: "100"
      model:
        description: "Model id"
        required: false
        default: "claude-opus-4-7"

concurrency:
  group: job-search-manual
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout vault as workspace
        uses: actions/checkout@v4
        with:
          repository: norjala/obsidian
          token: ${{ secrets.VAULT_PAT }}
          fetch-depth: 1
          persist-credentials: true

      - name: Run agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ inputs.prompt }}
          claude_args: "--agent job-search-agent --max-turns ${{ inputs.max_turns }} --model ${{ inputs.model }}"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Commit and push vault changes
        if: success()
        run: |
          git config user.name "job-finder-agent[bot]"
          git config user.email "job-finder-agent@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No vault changes to commit."
            exit 0
          fi
          git commit -m "Manual run $(date -u +%F-%H%M)"
          git pull --rebase
          git push
