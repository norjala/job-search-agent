name: Daily Run

# Runs the job-search agent's daily workflow.
#
# Schedule: 14:00 UTC = 07:00 PT during DST (mid-Mar to early Nov),
# 06:00 PT during PST. GH Actions cron is UTC-only and best-effort
# (busy-window skips happen). The watchdog workflow catches missed runs.
#
# The vault repo is checked out as the workspace itself (no `path:`)
# so that:
#   - The agent definition at vault/.claude/agents/job-search-agent.md
#     is resolvable as `--agent job-search-agent` (claude searches
#     .claude/agents from cwd = workspace).
#   - Relative paths like `work/job-search/pipeline.md` in the agent's
#     instructions resolve correctly without any `cd` gymnastics.

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      prompt_override:
        description: "Optional override for the agent prompt"
        required: false
        default: ""

concurrency:
  group: job-search-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout vault as workspace
        uses: actions/checkout@v4
        with:
          repository: norjala/obsidian
          token: ${{ secrets.VAULT_PAT }}
          fetch-depth: 1
          persist-credentials: true

      - name: Clear stale health alert
        run: rm -f work/job-search/_HEALTH_ALERT.md

      - name: Run agent
        uses: anthropics/claude-code-action@v1
        with:
          prompt: ${{ inputs.prompt_override != '' && inputs.prompt_override || 'Run your daily workflow. The vault root is the current working directory; treat all paths as relative to cwd.' }}
          claude_args: "--agent job-search-agent --max-turns 100 --model claude-opus-4-7"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

      - name: Commit and push vault changes
        if: success()
        run: |
          git config user.name "job-finder-agent[bot]"
          git config user.email "job-finder-agent@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No vault changes to commit."
            exit 0
          fi
          git commit -m "Daily digest $(date -u +%F)"
          git pull --rebase
          git push

      - name: Write health alert on failure
        if: failure()
        run: |
          mkdir -p work/job-search
          cat > work/job-search/_HEALTH_ALERT.md <<EOF
          # 🚨 Health Alert

          Cloud daily run failed at $(date -u).

          - Workflow: \`daily.yml\`
          - Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          Inspect the GitHub Actions logs and fix before the next scheduled run.
          \`/daily\` will hard-block on this file's existence; delete it (or let
          the next successful run delete it) once the issue is resolved.
          EOF
          git config user.name "job-finder-agent[bot]"
          git config user.email "job-finder-agent@users.noreply.github.com"
          git add work/job-search/_HEALTH_ALERT.md
          git commit -m "Health alert: daily run failed"
          git pull --rebase
          git push

      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK not set; skipping Discord notification."
            exit 0
          fi
          payload=$(jq -n --arg url "$RUN_URL" '{content: ("🚨 job-finder-agent **daily** run failed: " + $url)}')
          curl -fsS -X POST "$DISCORD_WEBHOOK" \
            -H 'Content-Type: application/json' \
            -d "$payload"
